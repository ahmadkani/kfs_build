name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # This setting is crucial: it sets up .npmrc for publishing
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Optional: Add a build step if your package needs compilation (e.g., TypeScript)
      # - name: Build
      #   run: npm run build

      - name: Publish to NPM
        run: npm publish
        env:
          # This uses the secret we created in Step 2
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}