name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    # This step creates a .npmrc file in the root, which is fine
    # because NPM checks parent directories for config.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        # This tells GitHub to run 'npm ci' inside the kfs-vite folder
        working-directory: ./kfs-vite

      # Optional: Build step (if you have a build script)
      # - name: Build
      #   run: npm run build
      #   working-directory: ./kfs-vite

      - name: Publish to NPM
        run: npm publish
        # This tells GitHub to run 'npm publish' from inside kfs-vite
        # NPM will pack whatever is in THIS folder.
        working-directory: ./kfs-vite
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}